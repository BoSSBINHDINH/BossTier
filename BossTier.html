<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTIERS · PVP Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0d14;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container { max-width: 1200px; width: 100%; }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .logo img {
            height: 100px;
            width: auto;
            display: block;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .server-ip {
            font-size: 0.85rem;
            color: #8892b0;
            background: #1a1e28;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid #2a2f3e;
        }
        .server-ip i { margin-right: 6px; color: #6a7a9a; }
        .discord-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2c2f3a;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #c8d0e0;
            text-decoration: none;
            transition: 0.2s;
            border: 1px solid #3a3f4e;
        }
        .discord-link:hover {
            background: #3a3f4e;
            color: #fff;
            border-color: #5a6b8a;
        }
        .discord-link i { color: #7289da; font-size: 1.1rem; }

        /* SEARCH BAR */
        .search-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        .search-box {
            background: #1a1e28;
            border: 1px solid #2a2f3e;
            border-radius: 30px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 280px;
            width: 100%;
        }
        .search-box i {
            color: #6a7a9a;
            font-size: 0.9rem;
        }
        .search-box input {
            background: transparent;
            border: none;
            color: #eef2ff;
            font-size: 0.85rem;
            font-family: inherit;
            padding: 6px 0;
            outline: none;
            width: 100%;
        }
        .search-box input::placeholder {
            color: #4a5a7a;
        }

        /* MENU TABS */
        .menu-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1e2330;
            padding-bottom: 0.8rem;
        }
        .menu-tabs .tab {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 30px;
            background: transparent;
            border: 1px solid transparent;
            font-size: 0.85rem;
            font-weight: 500;
            color: #8892b0;
            cursor: pointer;
            transition: 0.2s;
        }
        .menu-tabs .tab:hover {
            color: #c8d0e0;
            background: #181e2c;
        }
        .menu-tabs .tab.active {
            color: #f5d742;
            background: #1e1f2a;
            border-color: #f5d742;
        }
        .menu-tabs .tab img {
            width: 20px;
            height: 20px;
            vertical-align: middle;
        }
        .menu-tabs .tab i {
            font-size: 0.9rem;
        }

        /* RANKING TABLE */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            background: #11151f;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1e2332;
        }
        .ranking-table th {
            background: #0d111c;
            padding: 14px 16px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6a7a9a;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #1a1f2c;
        }
        .ranking-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #171c2a;
            vertical-align: middle;
        }
        .ranking-table tr:last-child td {
            border-bottom: none;
        }
        .ranking-table tr:hover td {
            background: #181e2c;
        }

        .rank-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rank-badge {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
            position: relative;
            background: #2a3045;
            overflow: hidden;
        }
        .rank-badge .rank-number {
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }
        .rank-badge.gold {
            background: linear-gradient(135deg, #f5d742, #d4a017);
            box-shadow: 0 0 30px rgba(245, 215, 66, 0.25);
        }
        .rank-badge.silver {
            background: linear-gradient(135deg, #c0c8d8, #8892a8);
            box-shadow: 0 0 20px rgba(192, 200, 216, 0.2);
        }
        .rank-badge.bronze {
            background: linear-gradient(135deg, #d4a06a, #b8834a);
            box-shadow: 0 0 20px rgba(212, 160, 106, 0.2);
        }
        .rank-badge.gold::after,
        .rank-badge.silver::after,
        .rank-badge.bronze::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(25deg); }
            100% { transform: translateX(100%) rotate(25deg); }
        }

        .player-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .player-avatar {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            background: #1a1e28;
            border: 2px solid #2a3045;
        }
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .player-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f0f2f8;
        }
        .player-name a {
            color: #f5d742;
            text-decoration: none;
        }
        .player-name a:hover {
            text-decoration: underline;
        }

        .region-cell {
            font-size: 0.8rem;
            font-weight: 500;
            color: #b0b8d0;
            background: #1a1f2c;
            padding: 2px 12px;
            border-radius: 30px;
            display: inline-block;
        }

        .title-cell {
            font-size: 0.75rem;
            font-weight: 500;
            color: #f5d742;
            background: #1f2538;
            padding: 4px 12px 4px 8px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .title-cell img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }
        .title-cell .pts {
            color: #8892b0;
            font-weight: 400;
        }

        .tiers-cell {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 300px;
        }
        .tier-tag {
            background: #1a1f2c;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b0b8d0;
            border: 1px solid #2a3045;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .tier-tag img {
            width: 14px;
            height: 14px;
            object-fit: contain;
        }

        .arrow-cell {
            color: #4a5a7a;
            text-align: right;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #11151f;
            border-radius: 20px;
            padding: 2rem;
            max-width: 520px;
            width: 92%;
            border: 1px solid #2a3045;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #6a7a9a;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.2s;
            z-index: 5;
        }
        .modal-close:hover { color: #fff; }

        .modal-main {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }
        .modal-avatar-wrap {
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #f5d742;
            background: #1a1e28;
        }
        .modal-avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .modal-info {
            flex: 1;
            min-width: 0;
        }
        .modal-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5d742;
            line-height: 1.2;
        }
        .modal-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #f0f2f8;
            background: #1f2538;
            padding: 2px 14px 2px 8px;
            border-radius: 30px;
            margin: 4px 0;
        }
        .modal-title img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .modal-region {
            font-size: 0.85rem;
            color: #8892b0;
            margin: 2px 0;
        }
        .modal-namemc {
            display: inline-block;
            margin-top: 4px;
            font-size: 0.8rem;
            color: #e6b422;
            text-decoration: none;
        }
        .modal-namemc:hover {
            text-decoration: underline;
        }

        .modal-position {
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid #1a1f2c;
        }
        .modal-position-label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .modal-overall-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 2px;
        }
        .modal-overall-rank {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f5d742;
        }
        .modal-overall-text {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }
        .modal-overall-points {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            font-weight: 400;
        }

        .modal-tiers-section {
            margin-top: 0.75rem;
        }
        .modal-tiers-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #ccd6f0;
            margin-bottom: 6px;
        }
        .modal-tiers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .modal-tier-item {
            background: #1a1f2c;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b0b8d0;
            border: 1px solid #2a3045;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .modal-tier-item img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .footer {
            margin-top: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.8rem;
            color: #4a5a7a;
            border-top: 1px solid #1a1f2c;
            padding-top: 1.5rem;
        }
        .footer a {
            color: #8892b0;
            text-decoration: none;
        }
        .footer a:hover { color: #f5d742; }

        @media (max-width: 820px) {
            .ranking-table th, .ranking-table td {
                padding: 10px 12px;
                font-size: 0.75rem;
            }
            .tiers-cell { gap: 4px; }
            .tier-tag { font-size: 0.6rem; padding: 2px 8px; }
            .player-name { font-size: 0.85rem; }
            .logo img { height: 70px; }
            .player-avatar { width: 38px; height: 38px; }
            .search-box { max-width: 100%; }
        }
        @media (max-width: 640px) {
            .ranking-table, .ranking-table tbody, .ranking-table tr, .ranking-table td {
                display: block;
            }
            .ranking-table tr {
                padding: 12px 0;
                border-bottom: 1px solid #1a1f2c;
            }
            .ranking-table td {
                border: none;
                padding: 4px 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .ranking-table td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #6a7a9a;
                font-size: 0.7rem;
                text-transform: uppercase;
                min-width: 60px;
            }
            .ranking-table th { display: none; }
            .header { flex-direction: column; align-items: stretch; }
            .header-right { justify-content: space-between; flex-wrap: wrap; }
            .logo img { height: 50px; }
            .modal-box { padding: 1.25rem; }
            .modal-main { flex-direction: column; align-items: center; text-align: center; }
            .modal-avatar-wrap { width: 80px; height: 80px; }
            .modal-name { font-size: 1.3rem; }
            .modal-tiers-list { justify-content: center; }
            .modal-overall-row { justify-content: center; }
            .modal-tier-item { font-size: 0.7rem; padding: 3px 10px; }
            .modal-tier-item img { width: 14px; height: 14px; }
        }
    </style>
</head>

        if (points >= 300) return "Combat Master";
        if (points >= 200) return "Combat Ace";
        if (points >= 150) return "Combat Specialist";
        if (points >= 100) return "Combat Novice";

            ign: "skeleten2k12",
            region: "AS",
            modes: { vanilla: "HT4" },
            points: 0
        }
    ];

    // ============================================================
    // TÍNH ĐIỂM & GÁN TITLE CHO TỪNG PLAYER
    // ============================================================
    function calculatePlayerPoints(player) {
        let total = 0;
        for (let modeKey in player.modes) {
            const rank = player.modes[modeKey] || "";
            total += RANK_POINTS[rank] || 0;
        }
        return total;
    }

    // Tính điểm và gán title
    PLAYERS.forEach(p => {
        p.points = calculatePlayerPoints(p);
        p.title = getTitleByPoints(p.points);
    });

    // ============================================================
    // HÀM TIỆN ÍCH
    // ============================================================
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function getModePoints(player, modeId) {
        if (modeId === 'overall') {
            return player.points;
        }
        return RANK_POINTS[player.modes?.[modeId] || ""] || 0;
    }

    // ============================================================
    // RENDER MENU TABS
    // ============================================================
    let currentMode = 'overall';
    let searchQuery = '';

    function renderTabs(activeId) {
        const container = document.getElementById('menuTabs');
        if (!container) return;
        let html = '';
        for (let mode of MODES) {
            let iconHtml = '';
            if (mode.icon) {
                if (mode.icon.startsWith('http')) {
                    iconHtml = `<img src="${mode.icon}" alt="${mode.name}" style="width:20px;height:20px;">`;
                } else {
                    iconHtml = `<i class="${mode.icon}"></i>`;
                }
            }
            const activeClass = mode.id === activeId ? 'active' : '';
            html += `<span class="tab ${activeClass}" data-mode="${mode.id}">${iconHtml} ${mode.name}</span>`;
        }
        container.innerHTML = html;

        container.querySelectorAll('.tab').forEach(el => {
            el.addEventListener('click', function() {
                const modeId = this.dataset.mode;
                currentMode = modeId;
                renderTabs(modeId);
                renderRanking(modeId);
            });
        });
    }

    // ============================================================
    // RENDER BẢNG XẾP HẠNG (có tìm kiếm)
    // ============================================================
    function renderRanking(modeId) {
        const tbody = document.getElementById('rankingBody');
        if (!tbody) return;

        // Lọc theo tìm kiếm
        const searchLower = searchQuery.toLowerCase().trim();
        let filtered = PLAYERS;
        if (searchLower) {
            filtered = PLAYERS.filter(p => p.ign.toLowerCase().includes(searchLower));
        }

        const playersWithScore = filtered.map(p => ({
            ...p,
            modeScore: getModePoints(p, modeId)
        }));

        const sorted = playersWithScore.sort((a, b) => b.modeScore - a.modeScore);
        const filteredPlayers = sorted.filter(p => p.modeScore > 0);

        if (filteredPlayers.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align:center; padding:2rem; color:#6a7a9a; font-size:0.95rem;">
                        <i class="fas fa-user-slash" style="font-size:1.5rem; display:block; margin-bottom:0.5rem; color:#2a3045;"></i>
                        No players found matching "${escapeHtml(searchQuery)}"
                    </td>
                </tr>
            `;
            return;
        }

        let html = '';
        for (let i = 0; i < filteredPlayers.length; i++) {
            const p = filteredPlayers[i];
            const rank = i + 1;

            let rankClass = '';
            if (rank === 1) rankClass = 'gold';
            else if (rank === 2) rankClass = 'silver';
            else if (rank === 3) rankClass = 'bronze';

            const avatarUrl = `https://render.crafty.gg/3d/bust/${encodeURIComponent(p.ign)}`;
            const titleIcon = getTitleIcon(p.title);

            let tiersHtml = '';
            const modeOrder = ['sword', 'axe', 'mace', 'pot', 'nethop', 'uhc', 'vanilla', 'smp'];
            for (let modeKey of modeOrder) {
                const rankVal = p.modes[modeKey] || '';
                if (rankVal) {
                    const iconUrl = MODE_ICON_MAP[modeKey] || '';
                    tiersHtml += `<span class="tier-tag">
                        ${iconUrl ? `<img src="${iconUrl}" alt="">` : ''}
                        ${rankVal}
                    </span>`;
                }
            }

            html += `
                <tr class="player-row" data-ign="${escapeHtml(p.ign)}" 
                    data-title="${escapeHtml(p.title)}" 
                    data-region="${escapeHtml(p.region)}" 
                    data-points="${p.points}" 
                    data-avatar="${avatarUrl}" 
                    data-titleicon="${titleIcon}"
                    data-modes='${JSON.stringify(p.modes)}'
                    data-rank="${rank}">
                    <td data-label="#">
                        <div class="rank-cell">
                            <div class="rank-badge ${rankClass}">
                                <span class="rank-number">#${rank}</span>
                            </div>
                        </div>
                    </td>
                    <td data-label="Player">
                        <div class="player-cell">
                            <div class="player-avatar">
                                <img src="${avatarUrl}" alt="${escapeHtml(p.ign)}" 
                                     onerror="this.src='https://mc-heads.net/avatar/${encodeURIComponent(p.ign)}/44'">
                            </div>
                            <span class="player-name">
                                <a href="https://namemc.com/profile/${encodeURIComponent(p.ign)}" target="_blank" rel="noopener">
                                    ${escapeHtml(p.ign)}
                                </a>
                            </span>
                        </div>
                    </td>
                    <td data-label="Region">
                        <span class="region-cell">${escapeHtml(p.region)}</span>
                    </td>
                    <td data-label="Title">
                        <span class="title-cell">
                            ${titleIcon ? `<img src="${titleIcon}" alt="${escapeHtml(p.title)}">` : ''}
                            ${escapeHtml(p.title)} <span class="pts">(${p.modeScore} pts)</span>
                        </span>
                    </td>
                    <td data-label="Tiers">
                        <div class="tiers-cell">${tiersHtml}</div>
                    </td>
                    <td data-label="" class="arrow-cell">
                        <i class="fas fa-chevron-right"></i>
                    </td>
                </tr>
            `;
        }

        tbody.innerHTML = html;

        tbody.querySelectorAll('.player-row').forEach(row => {
            row.addEventListener('click', function() {
                const ign = this.dataset.ign;
                const title = this.dataset.title;
                const region = this.dataset.region;
                const points = parseInt(this.dataset.points);
                const avatar = this.dataset.avatar;
                const titleIcon = this.dataset.titleicon;
                const modes = JSON.parse(this.dataset.modes);
                const rank = parseInt(this.dataset.rank);
                openModal(ign, title, region, points, avatar, titleIcon, modes, rank);
            });
        });
    }

    // ============================================================
    // MODAL
    // ============================================================
    function openModal(ign, title, region, points, avatar, titleIcon, modes, rank) {
        document.getElementById('modalAvatarImg').src = avatar;
        document.getElementById('modalAvatarImg').alt = ign;
        document.getElementById('modalAvatarImg').onerror = function() {
            this.src = `https://mc-heads.net/avatar/${encodeURIComponent(ign)}/100`;
        };

        document.getElementById('modalName').textContent = ign;

        const titleContainer = document.getElementById('modalTitle');
        titleContainer.innerHTML = '';
        if (titleIcon) {
            const img = document.createElement('img');
            img.src = titleIcon;
            img.alt = title;
            titleContainer.appendChild(img);
        }
        titleContainer.appendChild(document.createTextNode(' ' + title));

        document.getElementById('modalRegion').textContent = region;

        const link = document.getElementById('modalNameMcLink');
        link.href = `https://namemc.com/profile/${encodeURIComponent(ign)}`;

        document.getElementById('modalRank').textContent = `${rank}.`;
        document.getElementById('modalPoints').textContent = `(${points} points)`;

        const tiersContainer = document.getElementById('modalTiersList');
        tiersContainer.innerHTML = '';
        const modeOrder = ['sword', 'axe', 'mace', 'pot', 'nethop', 'uhc', 'vanilla', 'smp'];
        for (let modeKey of modeOrder) {
            const rankVal = modes[modeKey] || '';
            if (rankVal) {
                const iconUrl = MODE_ICON_MAP[modeKey] || '';
                const tag = document.createElement('span');
                tag.className = 'modal-tier-item';
                if (iconUrl) {
                    const img = document.createElement('img');
                    img.src = iconUrl;
                    img.alt = modeKey;
                    tag.appendChild(img);
                }
                tag.appendChild(document.createTextNode(' ' + rankVal));
                tiersContainer.appendChild(tag);
            }
        }

        document.getElementById('modalOverlay').classList.add('active');
    }

    document.getElementById('modalClose').addEventListener('click', function() {
        document.getElementById('modalOverlay').classList.remove('active');
    });
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
    });

    // ============================================================
    // SEARCH
    // ============================================================
    document.getElementById('searchInput').addEventListener('input', function() {
        searchQuery = this.value;
        renderRanking(currentMode);
    });

    // ============================================================
    // KHỞI TẠO
    // ============================================================
    const defaultMode = 'overall';
    renderTabs(defaultMode);
    renderRanking(defaultMode);
</script>

</body>
</html>
